name: Arduino Compile Check

on:
  push:
    paths:
      - 'sketches/**'
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        sketch: [sketches/server, sketches/client, sketches/blink]

    steps:
      - uses: actions/checkout@v4

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$PWD/bin" >> $GITHUB_PATH

      - name: Install ESP32 core + libraries
        run: |
          bin/arduino-cli config init
          bin/arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          bin/arduino-cli core update-index
          bin/arduino-cli core install esp32:esp32
          bin/arduino-cli lib install "ESP8266 Influxdb"

      - name: Compile ${{ matrix.sketch }}
        run: |
          bin/arduino-cli compile --fqbn esp32:esp32:esp32 ${{ matrix.sketch }}
